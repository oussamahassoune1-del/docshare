<!DOCTYPE html>
<html lang="fr">
<head>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>One Mobility – Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#0f1117;color:#fff;min-height:100vh;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#1a1d26;}::-webkit-scrollbar-thumb{background:#2d3148;border-radius:3px;}
input,select,button{font-family:'DM Sans',sans-serif;outline:none;}button{cursor:pointer;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite;}
.btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;transition:opacity .2s;box-shadow:0 4px 14px rgba(37,99,235,.3);}
.btn-primary:hover{opacity:.9;}.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.input-field{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:9px 12px;color:#fff;font-size:13px;transition:border-color .2s;}
.input-field:focus{border-color:#2563eb;}.input-field::placeholder{color:#475569;}
.label{display:block;color:#94a3b8;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.toast{position:fixed;bottom:28px;right:28px;z-index:9999;padding:14px 22px;border-radius:12px;font-size:14px;font-weight:500;animation:slideIn .3s ease;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.toast.success{background:#1a6b3a;border:1px solid #2d9e60;}.toast.error{background:#6b1a1a;border:1px solid #9e2d2d;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px);}
.modal-box{background:#141720;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:28px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;}
.nav-btn{width:100%;display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;border:none;margin-bottom:3px;background:transparent;color:#64748b;font-size:12px;text-align:left;cursor:pointer;position:relative;transition:all .15s;}
.nav-btn.active{background:rgba(37,99,235,.2);color:#60a5fa;font-weight:600;}
.nav-btn.active::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:3px;background:#2563eb;}
.kpi-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px 20px;transition:border-color .2s;}
.kpi-card:hover{border-color:rgba(255,255,255,.15);}
.chart-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px;}
.filter-pill{padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#94a3b8;font-size:12px;cursor:pointer;transition:all .15s;}
.filter-pill.active{background:rgba(37,99,235,.2);border-color:#2563eb;color:#60a5fa;font-weight:600;}
.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{background:rgba(37,99,235,.15);color:#60a5fa;padding:9px 12px;text-align:left;font-weight:600;border-bottom:1px solid rgba(255,255,255,.08);white-space:nowrap;position:sticky;top:0;z-index:1;}
.data-table td{padding:7px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:#cbd5e1;}
.data-table tr:hover td{background:rgba(37,99,235,.06);}
.badge{font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px;}
.badge.admin{background:rgba(139,92,246,.2);color:#a78bfa;}.badge.user{background:rgba(37,99,235,.15);color:#60a5fa;}
.badge.ok{background:rgba(34,197,94,.15);color:#4ade80;}.badge.nok{background:rgba(239,68,68,.15);color:#f87171;}
.section-header{background:#0d0f18;border-bottom:1px solid rgba(255,255,255,.06);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
select.input-field option{background:#1a1d26;}
.refresh-btn{width:34px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:#94a3b8;}
.refresh-btn:hover{border-color:#2563eb;color:#60a5fa;background:rgba(37,99,235,.1);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" style="display:none;min-height:100vh;background:#0a0c12;align-items:center;justify-content:center;position:relative;overflow:hidden;">
  <div style="position:absolute;width:400px;height:400px;border-radius:50%;background:#1e3a8a;filter:blur(80px);opacity:.2;top:10%;left:5%;animation:float 4s ease-in-out infinite;"></div>
  <div style="position:absolute;width:350px;height:350px;border-radius:50%;background:#1e3a5a;filter:blur(80px);opacity:.2;bottom:10%;right:8%;animation:float 5s ease-in-out infinite .7s;"></div>
  <div style="position:relative;z-index:1;width:100%;max-width:420px;background:rgba(18,20,30,.92);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:40px;animation:fadeUp .5s ease;box-shadow:0 32px 80px rgba(0,0,0,.6);">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#2563eb,#1d4ed8);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <h1 style="font-size:22px;font-weight:700;">One Mobility</h1>
      <p style="color:#64748b;font-size:13px;margin-top:4px;">Tableau de bord logistique</p>
    </div>
    <div style="margin-bottom:14px;"><label class="label">Email</label>
      <input id="loginEmail" type="email" class="input-field" placeholder="vous@entreprise.com" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div style="margin-bottom:20px;position:relative;"><label class="label">Mot de passe</label>
      <input id="loginPw" type="password" class="input-field" placeholder="••••••••" style="padding-right:44px;" onkeydown="if(event.key==='Enter')doLogin()"/>
      <button onclick="togglePw('loginPw')" style="position:absolute;right:12px;bottom:10px;background:none;border:none;color:#64748b;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div id="loginError" style="display:none;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:10px 14px;color:#f87171;font-size:13px;margin-bottom:16px;"></div>
    <button onclick="doLogin()" id="loginBtn" class="btn-primary" style="width:100%;justify-content:center;padding:13px;font-size:14px;">Se connecter →</button>
    <div style="margin-top:18px;padding:12px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.06);">
      <p style="color:#475569;font-size:11px;text-align:center;">Admin : <span style="color:#60a5fa;font-weight:600;">admin@entreprise.com</span> / <span style="color:#60a5fa;font-weight:600;">admin123</span></p>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appPage" style="display:none;flex-direction:row;min-height:100vh;">
  <!-- Sidebar -->
  <aside style="width:210px;background:#0d0f18;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;padding:18px 12px;flex-shrink:0;min-height:100vh;">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:24px;padding-left:4px;">
      <div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#2563eb,#1d4ed8);display:flex;align-items:center;justify-content:center;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <div><div style="color:#fff;font-weight:700;font-size:13px;">One Mobility</div><div style="color:#475569;font-size:10px;">Logistique</div></div>
    </div>
    <div style="background:rgba(255,255,255,.04);border-radius:10px;padding:9px;margin-bottom:18px;border:1px solid rgba(255,255,255,.06);">
      <div style="display:flex;align-items:center;gap:8px;">
        <div id="sidebarAvatar" style="width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;flex-shrink:0;"></div>
        <div><div id="sidebarName" style="color:#e2e8f0;font-size:12px;font-weight:600;"></div><div id="sidebarDept" style="color:#475569;font-size:10px;"></div></div>
      </div>
    </div>
    <div style="color:#475569;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:0 6px;margin-bottom:6px;">Dashboards</div>
    <nav style="flex:1;">
      <button class="nav-btn active" id="navInventory" onclick="switchView('inventory')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Inventory
      </button>
      <button class="nav-btn" id="navScrap" onclick="switchView('scrap')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>Scrap
      </button>
      <button class="nav-btn" id="navExport" onclick="switchView('export')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Export / Import
      </button>
      <button class="nav-btn" id="navNegstock" onclick="switchView('negstock')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Negative Stock
      </button>
      <button class="nav-btn" id="navCycle" onclick="switchView('cycle')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,4 23,10 17,10"/><polyline points="1,20 1,14 7,14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Cycle Count
      </button>
      <div style="height:1px;background:rgba(255,255,255,.06);margin:10px 0;"></div>
      <div style="color:#475569;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:0 6px;margin-bottom:6px;">Gestion</div>
      <button class="nav-btn" id="navFiles" onclick="switchView('files')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>Fichiers
      </button>
      <button class="nav-btn" id="navInbox" onclick="switchView('inbox')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 16,12 14,15 10,15 8,12 2,12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
        Reçus<span id="inboxBadge" style="display:none;margin-left:auto;background:#2563eb;color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:1px 6px;"></span>
      </button>
      <button class="nav-btn" id="navUsers" onclick="switchView('users')" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Utilisateurs
      </button>
    </nav>
    <button onclick="doLogout()" style="display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;border:none;background:transparent;color:#ef4444;font-size:12px;width:100%;cursor:pointer;margin-top:8px;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Déconnexion
    </button>
  </aside>

  <!-- Main content -->
  <main style="flex:1;overflow-y:auto;min-width:0;">
    <div id="viewInventory"></div>
    <div id="viewScrap" style="display:none;"></div>
    <div id="viewExport" style="display:none;"></div>
    <div id="viewNegstock" style="display:none;"></div>
    <div id="viewCycle" style="display:none;"></div>
    <div id="viewFiles" style="display:none;padding:24px;"></div>
    <div id="viewInbox" style="display:none;padding:24px;"></div>
    <div id="viewUsers" style="display:none;padding:24px;"></div>
  </main>
</div>

<!-- MODAL Share -->
<div id="shareModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
      <h2 style="font-size:15px;font-weight:700;">📤 Partager</h2>
      <button onclick="document.getElementById('shareModal').style.display='none'" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:18px;">✕</button>
    </div>
    <select id="shareTarget" class="input-field" style="margin-bottom:16px;"></select>
    <button onclick="doShare()" class="btn-primary" style="width:100%;justify-content:center;">✓ Partager</button>
  </div>
</div>

<!-- MODAL Create User -->
<div id="createUserModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
<h2 style="font-size:15px;font-weight:700;" id="createUserModalTitle">👤 Nouvel utilisateur</h2>      <button onclick="document.getElementById('createUserModal').style.display='none'" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:18px;">✕</button>
    </div>
    <div style="margin-bottom:11px;"><label class="label">Nom</label><input id="newName" type="text" class="input-field"/></div>
    <div style="margin-bottom:11px;"><label class="label">Email</label><input id="newEmail" type="email" class="input-field"/></div>
    <div style="margin-bottom:11px;"><label class="label" id="newPwLabel">Mot de passe</label><input id="newPw" type="password" class="input-field"/></div>
    <div style="margin-bottom:11px;"><label class="label">Département</label><input id="newDept" type="text" class="input-field"/></div>
    <div style="margin-bottom:16px;"><label class="label">Rôle</label>
      <select id="newRole" class="input-field"><option value="user">👤 Utilisateur</option><option value="admin">🛡️ Admin</option></select>
    </div>
    <div id="createUserError" style="display:none;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:9px 12px;color:#f87171;font-size:12px;margin-bottom:12px;"></div>
    <button onclick="doCreateUser()" class="btn-primary" style="width:100%;justify-content:center;">✓ Créer</button>
  </div>
</div><script>
// ── State ─────────────────────────────────────────────────────────────────────
let token=localStorage.getItem('ds_token'),currentUser=null,allUsers=[],allFiles=[],allShares=[],shareFileId=null;
let charts={};
const COLORS=['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#ef4444','#84cc16','#f97316','#a855f7','#14b8a6','#eab308','#64748b','#0ea5e9','#d946ef'];

// ── Helpers ───────────────────────────────────────────────────────────────────
function strColor(s){const C=['#3b82f6,#1d4ed8','#10b981,#065f46','#f59e0b,#92400e','#8b5cf6,#4c1d95','#ec4899,#831843','#06b6d4,#0e7490'];let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return C[Math.abs(h)%C.length];}
function fmtDate(ts){return new Date(ts).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function fmtSize(b){return b<1024?b+' o':b<1048576?(b/1024).toFixed(1)+' Ko':(b/1048576).toFixed(1)+' Mo';}
function fmtNum(n){if(n==null||isNaN(n))return'—';if(Math.abs(n)>=1e6)return(n/1e6).toFixed(2)+'M';if(Math.abs(n)>=1e3)return(n/1e3).toFixed(1)+'k';return Number(n).toLocaleString('fr-FR',{maximumFractionDigits:2});}
function fmtEur(n){if(n==null||isNaN(n))return'—';if(Math.abs(n)>=1e6)return(n/1e6).toFixed(2)+'M €';if(Math.abs(n)>=1e3)return(n/1e3).toFixed(1)+'k €';return Number(n).toLocaleString('fr-FR',{maximumFractionDigits:2})+' €';}
function fmtPct(n){return(Number(n)||0).toFixed(1)+'%';}
function togglePw(id){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';}
function excelDateToStr(v){
  if(!v||v==='')return'—';
  const n=parseFloat(v);
  if(!isNaN(n)&&n>40000&&n<60000){
    const d=new Date(Math.round((n-25569)*86400*1000));
    return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
  }
  return String(v);
}
function getCol(row,...names){for(const n of names){if(row[n]!==undefined&&row[n]!=='')return row[n];}return'';}
function normalizeKeys(arr){return arr.map(row=>{const nr={};Object.keys(row).forEach(k=>{nr[k.trim().toUpperCase().replace(/ /g,'_')]=row[k];});return nr;});}

function toast(msg,type='success'){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const d=document.createElement('div');d.className=`toast ${type}`;
  d.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="${type==='success'?'M20 6L9 17l-5-5':'M18 6L6 18M6 6l12 12'}"/></svg>${msg}`;
  document.body.appendChild(d);setTimeout(()=>d.remove(),3500);
}

async function api(method,path,body,isFile=false){
  const opts={method,headers:{'Authorization':'Bearer '+token}};
  if(body&&!isFile){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body);}
  if(body&&isFile){opts.body=body;}
  const r=await fetch(path,opts);
  if(path.endsWith('/download'))return r;
  const data=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(data.error||'Erreur');
  return data;
}

// ── Auth ──────────────────────────────────────────────────────────────────────
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pw=document.getElementById('loginPw').value;
  const errEl=document.getElementById('loginError'),btn=document.getElementById('loginBtn');
  if(!email||!pw){errEl.textContent='Remplissez tous les champs';errEl.style.display='block';return;}
  btn.disabled=true;btn.textContent='Connexion...';
  try{
    const d=await api('POST','/api/login',{email,password:pw});
    token=d.token;localStorage.setItem('ds_token',token);currentUser=d.user;
    errEl.style.display='none';await initApp();
  }catch(e){errEl.textContent=e.message;errEl.style.display='block';}
  btn.disabled=false;btn.innerHTML='Se connecter →';
}
function doLogout(){token=null;currentUser=null;localStorage.removeItem('ds_token');showLogin();}
function showLogin(){document.getElementById('loading').style.display='none';document.getElementById('loginPage').style.display='flex';document.getElementById('appPage').style.display='none';}
function showApp(){document.getElementById('loading').style.display='none';document.getElementById('loginPage').style.display='none';document.getElementById('appPage').style.display='flex';}

async function initApp(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('loginPage').style.display='none';
  document.getElementById('appPage').style.display='none';
  try{
    if(token&&!currentUser)currentUser=await api('GET','/api/me');
    await Promise.all([loadUsers(),loadFiles(),loadShares()]);
    renderSidebar();switchView('inventory');showApp();
  }catch{showLogin();}
}

async function loadUsers(){try{allUsers=await api('GET','/api/users');}catch{}}
async function loadFiles(){try{allFiles=await api('GET','/api/files');}catch{}}
async function loadShares(){try{allShares=await api('GET','/api/shares');}catch{}}

function renderSidebar(){
  const n=currentUser.name;const[c1,c2]=strColor(n).split(',');
  const av=document.getElementById('sidebarAvatar');
  av.style.background=`linear-gradient(135deg,${c1},${c2})`;av.textContent=n[0].toUpperCase();
  document.getElementById('sidebarName').textContent=n;
  document.getElementById('sidebarDept').textContent=currentUser.dept||currentUser.role;
  if(currentUser.role==='admin')document.getElementById('navUsers').style.display='flex';
  updateBadge();
}
function updateBadge(){
  const c=allShares.filter(s=>s.toUserId===currentUser.id).length;
  const b=document.getElementById('inboxBadge');
  if(c>0){b.textContent=c;b.style.display='inline';}else b.style.display='none';
}

// ── Views ─────────────────────────────────────────────────────────────────────
const ALL_VIEWS=['inventory','scrap','export','negstock','cycle','files','inbox','users'];
let currentView='inventory';

function switchView(v){
  currentView=v;
  ALL_VIEWS.forEach(x=>{
    const el=document.getElementById('view'+x.charAt(0).toUpperCase()+x.slice(1));
    if(el)el.style.display=x===v?'block':'none';
    const btn=document.getElementById('nav'+x.charAt(0).toUpperCase()+x.slice(1));
    if(btn)btn.classList.toggle('active',x===v);
  });
  if(v==='inventory')renderDashShell('inventory','📦 Inventory','renderInventory');
  else if(v==='scrap')renderDashShell('scrap','🗑️ Scrap','renderScrap');
  else if(v==='export')renderDashShell('export','🚢 Export / Import','renderExport');
  else if(v==='negstock')renderDashShell('negstock','📉 Negative Stock','renderNegstock');
  else if(v==='cycle')renderDashShell('cycle','🔄 Cycle Count','renderCycle');
  else if(v==='files')renderFiles();
  else if(v==='inbox')renderInbox();
  else if(v==='users')renderUsers();
}

// ── Generic Dashboard Shell ───────────────────────────────────────────────────
function getAccessibleFiles(){
  const owned=allFiles.filter(f=>f.ownerId===currentUser.id);
  const received=allShares.filter(s=>s.toUserId===currentUser.id).map(s=>allFiles.find(f=>f.id===s.fileId)).filter(Boolean);
  const all2=currentUser.role==='admin'?allFiles:[...owned,...received];
  return[...new Map(all2.map(f=>[f.id,f])).values()];
}

// ── Load & Render ─────────────────────────────────────────────────────────────
const dashData={};

async function loadDash(view,renderFn,fileId){
  if(!fileId)return;
  const content=document.getElementById(`content_${view}`);
  content.innerHTML=`<div style="text-align:center;padding:60px;color:#64748b;"><svg class="spin" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" style="display:block;margin:0 auto 12px;"><polyline points="23,4 23,10 17,10"/><polyline points="1,20 1,14 7,14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Chargement...</div>`;
  try{
    const r=await api('GET',`/api/files/${fileId}/download`);
    const buf=await r.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const json=XLSX.utils.sheet_to_json(ws,{defval:''});
    dashData[view]=normalizeKeys(json);
    window[renderFn](view);
  }catch(e){content.innerHTML=`<p style="color:#f87171;padding:24px;">Erreur: ${e.message}</p>`;}
}

async function refreshDash(view,renderFn){
  const btn=document.getElementById(`refreshBtn_${view}`);
  const svg=btn?.querySelector('svg');
  if(svg)svg.classList.add('spin');
  await loadFiles();await loadShares();
  const selVal=document.getElementById(`sel_${view}`)?.value;
  if(selVal)await loadDash(view,renderFn,selVal);
  else if(svg)svg.classList.remove('spin');
  if(svg)setTimeout(()=>svg.classList.remove('spin'),800);
  toast('Données actualisées !');
}

async function uploadAndLoad(view,renderFn,input){
  const file=input.files[0];if(!file)return;
  if(!file.name.match(/\.(xlsx|xls|csv)$/i)){toast('Seuls xlsx, xls, csv acceptés','error');return;}
  try{
    const fd=new FormData();fd.append('file',file);
    const nf=await api('POST','/api/files',fd,true);
    allFiles.push(nf);
    const sel=document.getElementById(`sel_${view}`);
    sel.innerHTML+=`<option value="${nf.id}">${nf.name}</option>`;
    sel.value=nf.id;
    await loadDash(view,renderFn,nf.id);
    toast(`"${file.name}" importé !`);
  }catch(e){toast(e.message,'error');}
  input.value='';
}

function destroyCharts(...ids){ids.forEach(id=>{if(charts[id]){charts[id].destroy();delete charts[id];}});}

function makeChart(id,config){
  destroyCharts(id);
  const ctx=document.getElementById(id)?.getContext('2d');
  if(ctx)charts[id]=new Chart(ctx,config);
}

    items.map(k=>`<div class="kpi-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <div style="color:#64748b;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">${k.label}</div>
        <div style="width:28px;height:28px;border-radius:7px;background:${k.color}22;display:flex;align-items:center;justify-content:center;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="${k.color}" stroke-width="2"><path d="${k.icon}"/></svg>
        </div>
      </div>
      <div style="color:#fff;font-size:20px;font-weight:700;margin-bottom:2px;">${k.val}</div>
      <div style="color:#475569;font-size:11px;">${k.sub||''}</div>
    </div>`).join('')
  }</div>`;
}

function chartCard(title,canvasId,height=240){
  return`<div class="chart-card"><div style="margin-bottom:12px;"><h3 style="color:#e2e8f0;font-size:12px;font-weight:600;">${title}</h3></div><div style="height:${height}px;"><canvas id="${canvasId}"></canvas></div></div>`;
}

function tableSection(id,headers,rows,title='🗂️ DONNÉES'){
  const dayKeys=headers.filter(h=>h.includes('DATE')||h.includes('DAY')||h.includes('POSTING')||h.includes('TRAITEMENT')||h.includes('CRFF'));
  const numKeys=headers.filter(h=>h.includes('VALUE')||h.includes('AMOUNT')||h.includes('PRIX')||h.includes('PRICE')||h.includes('STOCK'));
  return`<div class="chart-card" style="margin-top:16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
      <h3 style="color:#e2e8f0;font-size:12px;font-weight:600;">${title} — ${rows.length} lignes</h3>
      <input type="text" placeholder="Rechercher..." oninput="filterTableById('${id}',this.value,${JSON.stringify(headers)},${JSON.stringify(rows.slice(0,500))})" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:5px 10px;color:#fff;font-size:12px;width:160px;"/>
    </div>
    <div style="overflow:auto;max-height:360px;border-radius:10px;border:1px solid rgba(255,255,255,.06);">
      <table class="data-table" id="${id}">
        <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
        <tbody>${rows.slice(0,300).map(row=>`<tr>${headers.map(h=>{
          let v=row[h]??'';
          if(dayKeys.includes(h))v=excelDateToStr(v);
          else if(numKeys.includes(h)){const n=parseFloat(v);if(!isNaN(n))v=n.toLocaleString('fr-FR',{maximumFractionDigits:2});}
          return`<td>${v}</td>`;
        }).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>
    ${rows.length>300?`<p style="color:#475569;font-size:11px;margin-top:6px;text-align:center;">Affichage limité à 300 lignes sur ${rows.length}</p>`:''}
  </div>`;
}

function filterTableById(id,val,headers,rows){
  const filtered=val?rows.filter(r=>Object.values(r).some(v=>String(v).toLowerCase().includes(val.toLowerCase()))):rows;
  const tbody=document.getElementById(id)?.querySelector('tbody');
  if(!tbody)return;
  const dayKeys=headers.filter(h=>h.includes('DATE')||h.includes('DAY')||h.includes('POSTING')||h.includes('TRAITEMENT')||h.includes('CRFF'));
  const numKeys=headers.filter(h=>h.includes('VALUE')||h.includes('AMOUNT')||h.includes('PRIX')||h.includes('PRICE')||h.includes('STOCK'));
  tbody.innerHTML=filtered.slice(0,300).map(row=>`<tr>${headers.map(h=>{
    let v=row[h]??'';
    if(dayKeys.includes(h))v=excelDateToStr(v);
    else if(numKeys.includes(h)){const n=parseFloat(v);if(!isNaN(n))v=n.toLocaleString('fr-FR',{maximumFractionDigits:2});}
    return`<td>${v}</td>`;
  }).join('')}</tr>`).join('');
}

// ── SCRAP ─────────────────────────────────────────────────────────────────────
function renderScrap(view){
  const data=dashData[view]||[];
  const content=document.getElementById(`content_${view}`);
  const amtKey='AMOUNT_IN_EUR';

  const uniqueTypes=[...new Set(data.map(r=>getCol(r,'TYPE')).filter(Boolean))];
  const uniqueAreas=[...new Set(data.map(r=>getCol(r,'AREA')).filter(Boolean))];
  const uniqueWeeks=[...new Set(data.map(r=>getCol(r,'WEEK')).filter(Boolean))];

  const typeMap={};
  data.forEach(r=>{const t=String(getCol(r,'TYPE')||'Autre');const v=Math.abs(parseFloat(getCol(r,amtKey,'AMOUNT_IN_LOCAL_CURRENCY'))||0);typeMap[t]=(typeMap[t]||0)+v;});
  const typeS=Object.entries(typeMap).sort((a,b)=>b[1]-a[1]);
  const totalScrapAbs=typeS.reduce((s,t)=>s+t[1],0);

  const areaColorMap={'Assembly':'#3b82f6','Cutting':'#f97316','Damage':'#ef4444','Manufacturing':'#10b981'};
  const getAreaColor=a=>areaColorMap[a]||'#8b5cf6';

  const typeAreaMap={};
  data.forEach(r=>{
    const t=String(getCol(r,'TYPE')||'Autre');
    const a=String(getCol(r,'AREA')||'?');
    const v=Math.abs(parseFloat(getCol(r,amtKey,'AMOUNT_IN_LOCAL_CURRENCY'))||0);
    if(!typeAreaMap[t])typeAreaMap[t]={};
    typeAreaMap[t][a]=(typeAreaMap[t][a]||0)+v;
  });

  const weekAreaMap={};
  data.forEach(r=>{
    const w=String(getCol(r,'WEEK')||'?');
    const a=String(getCol(r,'AREA')||'?');

makeChart('exp_fill',{

// ── Actions ───────────────────────────────────────────────────────────────────
async function uploadMainFile(input){
  const file=input.files[0];if(!file)return;
  if(!file.name.match(/\.(xlsx|xls|csv)$/i)){toast('Seuls xlsx, xls, csv acceptés','error');return;}
  try{const fd=new FormData();fd.append('file',file);const nf=await api('POST','/api/files',fd,true);allFiles.push(nf);renderFiles();toast(`"${file.name}" importé !`);}
  catch(e){toast(e.message,'error');}
  input.value='';
}

async function downloadFile(id,name){
  try{const r=await api('GET',`/api/files/${id}/download`);const blob=await r.blob();const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();toast('Téléchargement démarré');}
  catch(e){toast(e.message,'error');}
}

async function deleteFile(id){
  if(!confirm('Supprimer ce fichier ?'))return;
  try{await api('DELETE',`/api/files/${id}`);allFiles=allFiles.filter(f=>f.id!==id);allShares=allShares.filter(s=>s.fileId!==id);renderFiles();updateBadge();toast('Supprimé');}
  catch(e){toast(e.message,'error');}
}

function openShare(fid){
  shareFileId=fid;
  const already=allShares.filter(s=>s.fileId===fid).map(s=>s.toUserId);
  document.getElementById('shareTarget').innerHTML='<option value="">— Choisir —</option>'+allUsers.filter(u=>u.id!==currentUser.id&&!already.includes(u.id)).map(u=>`<option value="${u.id}">${u.name} (${u.dept})</option>`).join('');
  document.getElementById('shareModal').style.display='flex';
}

async function doShare(){
  const tid=document.getElementById('shareTarget').value;
  if(!tid){toast('Sélectionnez un utilisateur','error');return;}
  try{const s=await api('POST','/api/shares',{fileId:shareFileId,toUserId:tid});allShares.push(s);document.getElementById('shareModal').style.display='none';renderFiles();updateBadge();toast(`✓ Partagé avec ${s.toUserName}`);}
  catch(e){toast(e.message,'error');}
}

let editUserId=null;

function openCreateUser(user=null){
  editUserId=user?user.id:null;
  document.getElementById('newName').value=user?.name||'';
  document.getElementById('newEmail').value=user?.email||'';
  document.getElementById('newPw').value='';
  document.getElementById('newDept').value=user?.dept||'';
  document.getElementById('newRole').value=user?.role||'user';
  document.getElementById('createUserError').style.display='none';
  // Change modal title
  document.getElementById('createUserModalTitle').textContent=user?'✏️ Modifier utilisateur':'👤 Nouvel utilisateur';
  document.getElementById('newPwLabel').textContent=user?'Nouveau mot de passe (laisser vide = inchangé)':'Mot de passe';
  document.getElementById('createUserModal').style.display='flex';
}

async function doCreateUser(){
  const name=document.getElementById('newName').value.trim(),email=document.getElementById('newEmail').value.trim(),pw=document.getElementById('newPw').value,dept=document.getElementById('newDept').value.trim(),role=document.getElementById('newRole').value;
  const errEl=document.getElementById('createUserError');errEl.style.display='none';
  try{
    if(editUserId){
      // MODIFY existing user
      const body={name,email,dept,role};
      if(pw)body.password=pw;
      const u=await api('PUT',`/api/users/${editUserId}`,body);
      const idx=allUsers.findIndex(x=>x.id===editUserId);
      if(idx>=0)allUsers[idx]={...allUsers[idx],...u};
      document.getElementById('createUserModal').style.display='none';
      renderUsers();toast(`"${name}" modifié !`);
    }else{
      const u=await api('POST','/api/users',{name,email,password:pw,dept,role});
      allUsers.push(u);document.getElementById('createUserModal').style.display='none';
      renderUsers();toast(`"${name}" créé !`);
    }
  }catch(e){errEl.textContent=e.message;errEl.style.display='block';}
}
