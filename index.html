<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #faf8ef;
        }
        #game-container {
            width: 400px;
            height: 400px;
            background: #bbada0;
            border-radius: 10px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 15px;
            position: relative;
            user-select: none;
        }
        .tile {
            width: 80px;
            height: 80px;
            background: #cdc1b4;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #776e65;
            position: absolute;
            transition: transform 0.2s ease-in-out, background-color 0.2s ease-in-out;
            will-change: transform;
        }
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 20px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 20px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 20px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 16px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 16px; }
        #score {
            position: absolute;
            top: -50px;
            right: 0;
            font-size: 24px;
            font-weight: bold;
            color: #776e65;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: bold;
            color: #776e65;
            display: none;
            background: rgba(238, 228, 218, 0.8);
            padding: 20px 40px;
            border-radius: 10px;
            z-index: 10;
        }
        #restart-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            background-color: #8f7a66;
            color: white;
            cursor: pointer;
            user-select: none;
        }
        #restart-btn:hover {
            background-color: #9f8b77;
        }
    </style>
</head>
<body>
    <div id="game-wrapper" style="position: relative;">
        <div id="score">Score: 0</div>
        <div id="game-container"></div>
        <div id="message"></div>
        <button id="restart-btn">Restart</button>
    </div>

    <script>
        const GRID_SIZE = 4;
        const TILE_SIZE = 80;
        const TILE_GAP = 15;

        class Game2048 {
            constructor(container) {
                this.container = container;
                this.scoreElem = document.getElementById('score');
                this.messageElem = document.getElementById('message');
                this.restartBtn = document.getElementById('restart-btn');
                this.grid = this.createEmptyGrid();
                this.tiles = [];
                this.score = 0;
                this.isAnimating = false;

                this.restartBtn.addEventListener('click', () => this.restart());
                window.addEventListener('keydown', e => this.handleKey(e));

                this.restart();
            }

            createEmptyGrid() {
                let grid = [];
                for (let i = 0; i < GRID_SIZE; i++) {
                    grid[i] = new Array(GRID_SIZE).fill(null);
                }
                return grid;
            }

            restart() {
                this.grid = this.createEmptyGrid();
                this.score = 0;
                this.updateScore();
                this.messageElem.style.display = 'none';
                this.tiles.forEach(tile => tile.remove());
                this.tiles = [];
                this.addRandomTile();
                this.addRandomTile();
                this.render();
            }

            addRandomTile() {
                let emptyPositions = [];
                for (let r = 0; r < GRID_SIZE; r++) {
                    for (let c = 0; c < GRID_SIZE; c++) {
                        if (!this.grid[r][c]) emptyPositions.push({r, c});
                    }
                }
                if (emptyPositions.length === 0) return false;
                let pos = emptyPositions[Math.floor(Math.random() * emptyPositions.length)];
                this.grid[pos.r][pos.c] = 2 * (Math.random() < 0.9 ? 1 : 2);
                return true;
            }

            updateScore() {
                this.scoreElem.textContent = `Score: ${this.score}`;
            }

            handleKey(e) {
                if (this.isAnimating) return;
                let moved = false;
                switch (e.key) {
                    case 'ArrowUp': moved = this.move('up'); break;
                    case 'ArrowDown': moved = this.move('down'); break;
                    case 'ArrowLeft': moved = this.move('left'); break;
                    case 'ArrowRight': moved = this.move('right'); break;
                }
                if (moved) {
                    this.isAnimating = true;
                    this.addRandomTile();
                    this.render(() => {
                        this.isAnimating = false;
                        if (this.checkGameOver()) {
                            this.showMessage('Game Over!');
                        } else if (this.checkWin()) {
                            this.showMessage('You Win!');
                        }
                    });
                }
            }

            move(direction) {
                let moved = false;
                let merged = this.createEmptyGrid().map(row => row.map(() => false));

                const moveTile = (r, c, dr, dc) => {
                    if (!this.grid[r][c]) return false;
                    let nr = r + dr;
                    let nc = c + dc;
                    if (nr < 0 || nr >= GRID_SIZE || nc < 0 || nc >= GRID_SIZE) return false;

                    if (!this.grid[nr][nc]) {
                        this.grid[nr][nc] = this.grid[r][c];
                        this.grid[r][c] = null;
                        moved = true;
                        return true;
                    } else if (this.grid[nr][nc] === this.grid[r][c] && !merged[nr][nc] && !merged[r][c]) {
                        this.grid[nr][nc] *= 2;
                        this.score += this.grid[nr][nc];
                        this.grid[r][c] = null;
                        merged[nr][nc] = true;
                        moved = true;
                        return true;
                    }
                    return false;
                };

                let range = [...Array(GRID_SIZE).keys()];
                let movedThisTurn;

                switch (direction) {
                    case 'up':
                        for (let c = 0; c < GRID_SIZE; c++) {
                            do {
                                movedThisTurn = false;
                                for (let r = 1; r < GRID_SIZE; r++) {
                                    if (moveTile(r, c, -1, 0)) movedThisTurn = true;
                                }
                            } while (movedThisTurn);
                        }
                        break;
                    case 'down':
                        for (let c = 0; c < GRID_SIZE; c++) {
                            do {
                                movedThisTurn = false;
                                for (let r = GRID_SIZE - 2; r >= 0; r--) {
                                    if (moveTile(r, c, 1, 0)) movedThisTurn = true;
                                }
                            } while (movedThisTurn);
                        }
                        break;
                    case 'left':
                        for (let r = 0; r < GRID_SIZE; r++) {
                            do {
                                movedThisTurn = false;
                                for (let c = 1; c < GRID_SIZE; c++) {
                                    if (moveTile(r, c, 0, -1)) movedThisTurn = true;
                                }
                            } while (movedThisTurn);
                        }
                        break;
                    case 'right':
                        for (let r = 0; r < GRID_SIZE; r++) {
                            do {
                                movedThisTurn = false;
                                for (let c = GRID_SIZE - 2; c >= 0; c--) {
                                    if (moveTile(r, c, 0, 1)) movedThisTurn = true;
                                }
                            } while (movedThisTurn);
                        }
                        break;
                }
                this.updateScore();
                return moved;
            }

            checkGameOver() {
                for (let r = 0; r < GRID_SIZE; r++) {
                    for (let c = 0; c < GRID_SIZE; c++) {
                        if (!this.grid[r][c]) return false;
                        if (c < GRID_SIZE - 1 && this.grid[r][c] === this.grid[r][c + 1]) return false;
                        if (r < GRID_SIZE - 1 && this.grid[r][c] === this.grid[r + 1][c]) return false;
                    }
                }
                return true;
            }

            checkWin() {
                for (let r = 0; r < GRID_SIZE; r++) {
                    for (let c = 0; c < GRID_SIZE; c++) {
                        if (this.grid[r][c] === 2048) return true;
                    }
                }
                return false;
            }

            showMessage(msg) {
                this.messageElem.textContent = msg;
                this.messageElem.style.display = 'block';
            }

            render(callback) {
                // Clear old tiles
                this.tiles.forEach(tile => tile.remove());
                this.tiles = [];

                for (let r = 0; r < GRID_SIZE; r++) {
                    for (let c = 0; c < GRID_SIZE; c++) {
                        let value = this.grid[r][c];
                        if (value) {
                            let tile = document.createElement('div');
                            tile.className = `tile tile-${value}`;
                            tile.textContent = value;
                            tile.style.transform = `translate(${c * (TILE_SIZE + TILE_GAP)}px, ${r * (TILE_SIZE + TILE_GAP)}px)`;
                            this.container.appendChild(tile);
                            this.tiles.push(tile);
                        }
                    }
                }

                if (callback) {
                    setTimeout(callback, 200);
                }
            }
        }

        const game = new Game2048(document.getElementById('game-container'));
    </script>
</body>
</html>
